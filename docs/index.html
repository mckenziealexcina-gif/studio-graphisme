<!-- ====== CSS de l'affiche (v2 simple) — sert au rendu ET à l'export ====== -->
<style id="poster-css">
.poster,.poster *{box-sizing:border-box}
.poster *{margin:0;padding:0}
.poster{
  --paper:#0e0e0e; --ink:#ffffff; --gold:#d3ae32;
  --f-sans:"Inter",system-ui,sans-serif; --f-archivo:"Archivo",system-ui,sans-serif;
  position:relative; width:1080px; height:1350px; overflow:hidden; isolation:isolate;
  background:var(--paper); color:var(--ink); font-family:var(--f-sans);
}
.poster .wrap{ position:absolute; inset:0; padding:116px 122px 108px; display:flex; flex-direction:column;
  justify-content:space-between; text-align:center; align-items:center; }
.poster .brand{ font-family:var(--f-archivo); font-weight:800; font-size:34px; letter-spacing:.13em; color:var(--ink); }
.poster .brand .sub{ display:block; margin-top:13px; font-size:13px; letter-spacing:.28em; color:var(--ink); opacity:.55; font-weight:600; }
.poster .mid{ display:flex; flex-direction:column; align-items:center; }
.poster .eyebrow{ font-weight:600; font-size:12px; letter-spacing:.44em; color:var(--gold); }
.poster .title{ font-family:var(--f-archivo); font-weight:800; font-size:116px; line-height:.9; letter-spacing:-.02em; color:var(--ink); margin-top:26px; }
.poster .accent{ width:58px; height:3px; background:var(--gold); margin:34px auto 0; }
.poster .lede{ margin-top:32px; font-size:23px; line-height:1.45; color:var(--ink); opacity:.85; font-weight:400; }
.poster .role{ margin-top:52px; }
.poster .role .k{ font-family:var(--f-archivo); font-weight:700; font-size:26px; color:var(--ink); letter-spacing:-.01em; }
.poster .role .t{ margin-top:13px; font-weight:600; font-size:12.5px; letter-spacing:.3em; color:var(--gold); }
.poster .perks{ margin-top:26px; display:flex; flex-wrap:wrap; justify-content:center; font-size:15px; color:var(--ink); opacity:.82; }
.poster .perks span{ padding:0 19px; position:relative; }
.poster .perks span + span::before{ content:""; position:absolute; left:-2px; top:50%; transform:translateY(-50%);
  width:3px; height:3px; border-radius:50%; background:var(--gold); }
.poster .foot{ width:100%; display:flex; flex-direction:column; align-items:center; }
.poster .hr{ width:100%; height:1px; background:var(--ink); opacity:.14; }
.poster .succ-h{ margin-top:32px; font-weight:700; font-size:10.5px; letter-spacing:.36em; color:var(--ink); opacity:.6; }
.poster .succ{ margin-top:11px; font-size:13.5px; letter-spacing:.02em; color:var(--ink); opacity:.72; line-height:1.6; max-width:820px; }
.poster .contact{ margin-top:30px; }
.poster .contact .lbl{ font-size:10.5px; letter-spacing:.32em; color:var(--ink); opacity:.6; font-weight:600; }
.poster .contact .mail{ display:inline-block; margin-top:12px; font-family:var(--f-archivo); font-weight:700; font-size:26px; color:var(--gold); letter-spacing:-.005em; }
.poster .contact .site{ margin-top:14px; font-size:10.5px; letter-spacing:.42em; color:var(--ink); opacity:.45; font-weight:600; }
</style>

<!-- ====== CSS de l'interface ====== -->
<style>
  :root{ --bg:#0b0b0d; --panel:#141418; --line:#26262e; --txt:#e8e6df; --muted:#9a978e; --gold:#d3ae32; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:var(--bg); color:var(--txt); font-family:"Inter",system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  .app{ display:grid; grid-template-columns:390px 1fr; height:100vh; }
  @media(max-width:860px){ .app{ grid-template-columns:1fr; height:auto; } }

  .panel{ background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  .brandbar{ padding:16px 18px 12px; border-bottom:1px solid var(--line); }
  .brandbar h1{ margin:0; font-family:"Archivo",sans-serif; font-weight:800; font-size:18px;
    background:linear-gradient(120deg,#f3d98a,#d3ae32); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brandbar p{ margin:5px 0 0; font-size:11.5px; color:var(--muted); }

  /* Chat */
  .chat{ display:flex; flex-direction:column; border-bottom:1px solid var(--line); }
  .chat .log{ height:210px; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:9px; }
  .msg{ max-width:92%; padding:8px 11px; border-radius:11px; font-size:12.8px; line-height:1.45; white-space:pre-wrap; }
  .msg.user{ align-self:flex-end; background:#2a2620; border:1px solid #3a352b; }
  .msg.bot{ align-self:flex-start; background:#0e0d0b; border:1px solid var(--line); }
  .msg.sys{ align-self:center; font-size:11.5px; color:var(--muted); }
  .cbar{ display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--line); }
  .cbar textarea{ flex:1; resize:none; height:44px; background:#0e0e12; border:1px solid var(--line); color:var(--txt);
    border-radius:9px; padding:8px 10px; font:inherit; font-size:13px; }
  .cbar textarea:focus{ outline:none; border-color:var(--gold); }
  button{ font:inherit; cursor:pointer; border:none; border-radius:9px; }
  .send{ padding:0 15px; font-weight:700; color:#1a1406; background:var(--gold); }
  .send:disabled{ opacity:.55; cursor:progress; }
  .qbtns{ display:flex; flex-wrap:wrap; gap:6px; padding:0 12px 11px; }
  .qbtns button{ font-size:11px; color:var(--muted); background:#0e0d0b; border:1px solid var(--line); padding:5px 9px; }
  .qbtns button:hover{ border-color:var(--gold); color:var(--gold); }

  /* Formulaire */
  .form{ flex:1; overflow-y:auto; padding:14px 14px 24px; }
  .form h2{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:6px 0 10px; }
  .field{ margin-bottom:11px; }
  .field label{ display:block; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .field input, .field textarea{ width:100%; background:#0e0e12; border:1px solid var(--line); color:var(--txt);
    border-radius:8px; padding:8px 10px; font:inherit; font-size:13px; resize:vertical; }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--gold); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .colors{ display:flex; gap:14px; }
  .colors label{ flex:1; }
  .colors input[type=color]{ width:100%; height:34px; padding:2px; background:#0e0e12; border:1px solid var(--line); border-radius:8px; cursor:pointer; }

  .actions{ position:sticky; bottom:0; margin-top:14px; padding-top:12px; background:linear-gradient(transparent,var(--panel) 30%); }
  .quality{ display:flex; gap:6px; margin-bottom:9px; }
  .quality button{ flex:1; background:#0e0e12; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:6px; font-size:11px; }
  .quality button.on{ border-color:var(--gold); color:var(--gold); }
  .dl{ width:100%; padding:13px; font-weight:700; font-size:14px; color:#1a1406; background:linear-gradient(120deg,#f3d98a,#d3ae32); }
  .dl:disabled{ opacity:.6; cursor:progress; }

  .stage{ display:flex; align-items:center; justify-content:center; padding:26px; overflow:auto;
    background:radial-gradient(120% 120% at 50% 0%, #17171c, #0b0b0d 70%); }
  #scaler-box{ position:relative; }
  #scaler{ position:absolute; top:0; left:0; transform-origin:top left; box-shadow:0 30px 80px rgba(0,0,0,.55); }
</style>
</head>

<body>
<div class="app">

  <aside class="panel">
    <div class="brandbar">
      <h1>Studio Graphisme · IA</h1>
      <p>Décris tes changements à l'IA, ou édite les champs à la main.</p>
    </div>

    <!-- ===== Chat IA ===== -->
    <div class="chat">
      <div class="log" id="log">
        <div class="msg sys">Ex. « change le fond en bleu nuit » · « titre : ON EMBAUCHE » · « ajoute l'avantage café gratuit »</div>
      </div>
      <div class="qbtns" id="qbtns">
        <button>Fond crème, texte noir</button>
        <button>Titre plus court</button>
        <button>Ambiance néon</button>
      </div>
      <div class="cbar">
        <textarea id="cinput" placeholder="Demande une modif… (Entrée)"></textarea>
        <button class="send" id="csend">IA</button>
      </div>
    </div>

    <!-- ===== Formulaire ===== -->
    <div class="form" id="form">
      <h2>Contenu</h2>
      <div class="grid2">
        <div class="field"><label>Marque</label><input data-k="wordmark"></div>
        <div class="field"><label>Sous-titre</label><input data-k="wordsub"></div>
      </div>
      <div class="field"><label>Bandeau</label><input data-k="eyebrow"></div>
      <div class="field"><label>Titre (retour = nouvelle ligne)</label><textarea data-k="title" rows="2"></textarea></div>
      <div class="field"><label>Accroche</label><textarea data-k="lede" rows="2"></textarea></div>
      <div class="field"><label>Poste</label><input data-k="role"></div>
      <div class="field"><label>Type</label><input data-k="typeLine"></div>
      <div class="field"><label>Avantages (un par ligne)</label><textarea data-k="perks" rows="4"></textarea></div>

      <h2>Lieux & contact</h2>
      <div class="field"><label>Entête succursales</label><input data-k="succHeader"></div>
      <div class="field"><label>Succursales (une par ligne)</label><textarea data-k="succursales" rows="4"></textarea></div>
      <div class="field"><label>Appel à l'action</label><input data-k="ctaLabel"></div>
      <div class="grid2">
        <div class="field"><label>Courriel</label><input data-k="email"></div>
        <div class="field"><label>Site (vide = masqué)</label><input data-k="site"></div>
      </div>

      <h2>Couleurs</h2>
      <div class="colors">
        <label><span style="font-size:10px;color:var(--muted)">Fond</span><input type="color" data-k="colBg"></label>
        <label><span style="font-size:10px;color:var(--muted)">Or / accent</span><input type="color" data-k="colGold"></label>
        <label><span style="font-size:10px;color:var(--muted)">Texte</span><input type="color" data-k="colInk"></label>
      </div>

      <div class="actions">
        <div class="quality" id="quality">
          <button data-s="2">Web 2×</button>
          <button data-s="3" class="on">Standard 3×</button>
          <button data-s="4">Impression 4×</button>
        </div>
        <button class="dl" id="download">⬇ Télécharger le PNG</button>
      </div>
    </div>
  </aside>

  <main class="stage" id="stage">
    <div id="scaler-box"><div id="scaler">
      <div class="poster" id="poster">
        <div class="wrap">
          <div class="brand"><span id="p-wordmark"></span><span class="sub" id="p-wordsub"></span></div>
          <div class="mid">
            <div class="eyebrow" id="p-eyebrow"></div>
            <h1 class="title" id="p-title"></h1>
            <div class="accent"></div>
            <p class="lede" id="p-lede"></p>
            <div class="role"><div class="k" id="p-role"></div><div class="t" id="p-type"></div></div>
            <div class="perks" id="p-perks"></div>
          </div>
          <div class="foot">
            <div class="hr"></div>
            <div class="succ-h" id="p-succh"></div>
            <div class="succ" id="p-succ"></div>
            <div class="contact">
              <div class="lbl" id="p-ctalbl"></div>
              <div class="mail" id="p-email"></div>
              <div class="site" id="p-site"></div>
            </div>
          </div>
        </div>
      </div>
    </div></div>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const nl = (s) => esc(s).replace(/\n/g,"<br>");

const DEFAULT = {
  wordmark:"VAPE SOCIÉTÉ", wordsub:"ARTICLES POUR VAPOTEURS",
  eyebrow:"OFFRE D'EMPLOI", title:"NOUS\nRECRUTONS",
  lede:"On cherche des gens passionnés\npour rejoindre l'équipe.",
  role:"Conseiller·ère — vente & service", typeLine:"TEMPS PLEIN · TEMPS PARTIEL",
  perks:["Rabais employé","Formation payée","Équipe humaine","Horaires flexibles"],
  succHeader:"CINQ SUCCURSALES",
  succursales:["Neufchâtel","Charlesbourg","Donnacona","Sainte-Catherine-de-la-Jacques-Cartier","Sainte-Marie"],
  ctaLabel:"POSTULE EN SUCCURSALE OU À", email:"rh@vape-societe.com", site:"VAPE-SOCIETE.COM",
  colBg:"#0e0e0e", colGold:"#d3ae32", colInk:"#ffffff",
};
let state = structuredClone(DEFAULT);
let messages = [];

/* ---- appliquer l'état à l'affiche ---- */
function applyState(){
  const p = $("poster");
  p.style.setProperty("--paper", state.colBg);
  p.style.setProperty("--gold", state.colGold);
  p.style.setProperty("--ink", state.colInk);
  $("p-wordmark").textContent = state.wordmark;
  $("p-wordsub").textContent = state.wordsub;
  $("p-eyebrow").textContent = state.eyebrow;
  $("p-title").innerHTML = nl(state.title);
  $("p-lede").innerHTML = nl(state.lede);
  $("p-role").textContent = state.role;
  $("p-type").textContent = state.typeLine;
  $("p-perks").innerHTML = (state.perks||[]).map(x=>`<span>${esc(x)}</span>`).join("");
  $("p-succh").textContent = state.succHeader;
  $("p-succ").innerHTML = (state.succursales||[]).map(esc).join(" · ");
  $("p-ctalbl").textContent = state.ctaLabel;
  $("p-email").textContent = state.email;
  $("p-site").textContent = state.site;
  $("p-site").style.display = state.site ? "block" : "none";
}

/* ---- synchroniser les champs du formulaire depuis l'état ---- */
function syncForm(){
  document.querySelectorAll("[data-k]").forEach((el)=>{
    const k = el.dataset.k, v = state[k];
    if (k==="perks" || k==="succursales") el.value = (v||[]).join("\n");
    else el.value = v ?? "";
  });
}

/* ---- formulaire -> état ---- */
document.querySelectorAll("[data-k]").forEach((el)=>{
  el.addEventListener("input", ()=>{
    const k = el.dataset.k;
    if (k==="perks" || k==="succursales") state[k] = el.value.split("\n").map(s=>s.trim()).filter(Boolean);
    else state[k] = el.value;
    applyState();
  });
});

/* ---- mise à l'échelle de l'aperçu ---- */
function fit(){
  const st = $("stage"), pad = 54;
  const s = Math.min((st.clientWidth-pad)/1080, (st.clientHeight-pad)/1350, 1);
  $("scaler").style.transform = "scale("+s+")";
  const box = $("scaler-box"); box.style.width=(1080*s)+"px"; box.style.height=(1350*s)+"px";
}
window.addEventListener("resize", fit);

/* ---- Chat IA ---- */
function addMsg(role, text){
  const d = document.createElement("div");
  d.className = "msg " + (role==="user"?"user":role==="assistant"?"bot":"sys");
  d.textContent = text; $("log").appendChild(d); $("log").scrollTop = $("log").scrollHeight;
  return d;
}
async function askAI(text){
  text = (text || $("cinput").value).trim(); if(!text) return;
  $("cinput").value = "";
  addMsg("user", text); messages.push({ role:"user", content:text });
  $("csend").disabled = true; const wait = addMsg("assistant","…");
  try{
    const r = await fetch("/api/chat", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ messages, state }) });
    const data = await r.json();
    if(!r.ok) throw new Error(data.error || ("HTTP "+r.status));
    state = data.state || state; applyState(); syncForm();
    wait.textContent = data.reply || "✓ Mis à jour.";
    messages.push({ role:"assistant", content:data.reply || "" });
  }catch(e){
    const m = /api key|credential|401|apiKey/i.test(e.message)
      ? "L'IA n'est pas encore activée (clé Anthropic manquante côté serveur)."
      : e.message;
    wait.textContent = "⚠ " + m;
  }finally{ $("csend").disabled=false; $("cinput").focus(); }
}
$("csend").addEventListener("click", ()=>askAI());
$("cinput").addEventListener("keydown", (e)=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); askAI(); } });
$("qbtns").addEventListener("click", (e)=>{ const b=e.target.closest("button"); if(b) askAI(b.textContent); });

/* ---- Export PNG (foreignObject natif) ---- */
let SCALE = 3;
$("quality").addEventListener("click",(e)=>{ const b=e.target.closest("button"); if(!b)return;
  $("quality").querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); SCALE=+b.dataset.s; });

async function exportPNG(scale){
  const W=1080,H=1350;
  const fontsCss = $("fonts").textContent;
  const posterCss = $("poster-css").textContent;
  const clone = $("poster").cloneNode(true);
  clone.style.transform = "none";
  const html = new XMLSerializer().serializeToString(clone);
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'">'+
    '<foreignObject x="0" y="0" width="'+W+'" height="'+H+'"><div xmlns="http://www.w3.org/1999/xhtml">'+
    '<style>'+fontsCss+'\n'+posterCss+'</style>'+html+'</div></foreignObject></svg>';
  const img = new Image();
  await new Promise((res,rej)=>{ img.onload=res; img.onerror=()=>rej(new Error("svg")); img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg); });
  const c=document.createElement("canvas"); c.width=W*scale; c.height=H*scale;
  const ctx=c.getContext("2d"); ctx.imageSmoothingQuality="high"; ctx.setTransform(scale,0,0,scale,0,0); ctx.drawImage(img,0,0);
  return await new Promise(r=>c.toBlob(r,"image/png"));
}
$("download").addEventListener("click", async ()=>{
  const btn=$("download"), label=btn.textContent; btn.disabled=true; btn.textContent="Génération…";
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready;
    const blob=await exportPNG(SCALE); const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download="affiche-vape-societe.png"; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  }catch(e){ alert("Export impossible : "+e.message); }
  finally{ btn.disabled=false; btn.textContent=label; }
});

/* init */
syncForm(); applyState(); fit();
</script>
</body>
</html>

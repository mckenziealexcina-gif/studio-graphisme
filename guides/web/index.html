<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistant guides — Vape Société</title>
<style>
  :root{ --bg:#0e0e0c; --panel:#161512; --line:#2a2a26; --gold:#D9AE45; --gold-ink:#8a5a12;
    --txt:#efe9dc; --muted:#8f887c; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:var(--bg); color:var(--txt); font-family:"Segoe UI",system-ui,sans-serif; }
  .app{ display:grid; grid-template-columns:400px 1fr; height:100vh; }
  @media(max-width:820px){ .app{ grid-template-columns:1fr; height:auto; } }

  .chat{ display:flex; flex-direction:column; background:var(--panel); border-right:1px solid var(--line); min-height:0; }
  .head{ padding:16px 18px; border-bottom:1px solid var(--line); }
  .head h1{ margin:0; font-size:16px; letter-spacing:2px; color:var(--gold); font-weight:600; }
  .head p{ margin:5px 0 0; font-size:12px; color:var(--muted); }
  .log{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; min-height:0; }
  .msg{ max-width:92%; padding:10px 13px; border-radius:12px; font-size:13.5px; line-height:1.5; white-space:pre-wrap; }
  .msg.user{ align-self:flex-end; background:#2a2620; color:#f3ecdd; border:1px solid #3a352b; }
  .msg.bot{ align-self:flex-start; background:#12110e; color:#e7e1d3; border:1px solid var(--line); }
  .msg.sys{ align-self:center; font-size:12px; color:var(--muted); background:transparent; }
  .compose{ border-top:1px solid var(--line); padding:12px; display:flex; gap:8px; }
  .compose textarea{ flex:1; resize:none; height:52px; background:#0e0d0b; border:1px solid var(--line);
    color:var(--txt); border-radius:10px; padding:9px 11px; font:inherit; font-size:13.5px; }
  .compose textarea:focus{ outline:none; border-color:var(--gold); }
  button{ font:inherit; cursor:pointer; border:none; border-radius:10px; }
  .send{ padding:0 16px; font-weight:700; color:#1a1406; background:var(--gold); }
  .send:disabled{ opacity:.5; cursor:progress; }
  .examples{ padding:0 16px 12px; display:flex; flex-wrap:wrap; gap:6px; }
  .examples button{ font-size:11.5px; color:var(--muted); background:#12110e; border:1px solid var(--line); padding:6px 10px; }
  .examples button:hover{ border-color:var(--gold); color:var(--gold); }

  .stage{ display:flex; flex-direction:column; min-height:0; }
  .bar{ display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); background:#111; }
  .bar .sp{ flex:1; font-size:12px; color:var(--muted); }
  .canva{ padding:9px 15px; font-weight:700; color:#fff; background:#00c4cc; }
  .canva:disabled{ opacity:.5; cursor:not-allowed; }
  .dl{ padding:9px 13px; color:var(--txt); background:#232019; border:1px solid var(--line); }
  iframe{ flex:1; width:100%; border:0; background:#333; }
  .empty{ flex:1; display:grid; place-items:center; color:var(--muted); font-size:13px; text-align:center; padding:24px; }
</style>
</head>
<body>
<div class="app">

  <section class="chat">
    <div class="head">
      <h1>ASSISTANT GUIDES</h1>
      <p>Décris ton guide en français — l'aperçu PDF se met à jour à chaque réponse.</p>
    </div>
    <div class="log" id="log">
      <div class="msg sys">Ex. « Crée un aide-mémoire de fermeture pour l'employé »</div>
    </div>
    <div class="examples" id="examples">
      <button>Crée un guide d'accueil client en 4 sections</button>
      <button>Aide-mémoire de fermeture de caisse</button>
      <button>Rends la section Légalité non négociable</button>
    </div>
    <div class="compose">
      <textarea id="input" placeholder="Écris ici… (Entrée pour envoyer)"></textarea>
      <button class="send" id="send">Envoyer</button>
    </div>
  </section>

  <main class="stage">
    <div class="bar">
      <span class="sp" id="status">Aucun document pour l'instant.</span>
      <button class="dl" id="download" disabled>⬇ PDF</button>
      <button class="canva" id="toCanva" disabled>Exporter vers Canva</button>
    </div>
    <div class="empty" id="empty">L'aperçu du guide apparaîtra ici après ton premier message.</div>
    <iframe id="pdf" style="display:none"></iframe>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log"), input = $("input"), sendBtn = $("send");
let messages = [];   // [{role, content}]
let doc = null;      // DocumentModel courant
let pdfBase64 = null;

function addMsg(role, text){
  const d = document.createElement("div");
  d.className = "msg " + (role === "user" ? "user" : role === "assistant" ? "bot" : "sys");
  d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  return d;
}

function showPdf(b64){
  pdfBase64 = b64;
  const f = $("pdf");
  f.src = "data:application/pdf;base64," + b64;
  f.style.display = "block"; $("empty").style.display = "none";
  $("toCanva").disabled = false; $("download").disabled = false;
}

async function send(text){
  text = (text || input.value).trim();
  if (!text) return;
  input.value = "";
  addMsg("user", text);
  messages.push({ role: "user", content: text });
  sendBtn.disabled = true;
  const thinking = addMsg("assistant", "…");
  $("status").textContent = "L'agent travaille…";
  try {
    const r = await fetch("/api/guide/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages, doc }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
    doc = data.doc;
    thinking.textContent = data.reply || "✓ Mis à jour.";
    messages.push({ role: "assistant", content: data.reply || "" });
    if (data.pdfBase64) showPdf(data.pdfBase64);
    $("status").textContent = (doc?.sections?.length || 0) + " section(s) · " + (doc?.meta?.docLabel || "Guide");
  } catch (e) {
    thinking.textContent = "⚠ " + e.message + (/api key|credential|401/i.test(e.message) ? "  (définis ANTHROPIC_API_KEY côté serveur)" : "");
    $("status").textContent = "Erreur.";
  } finally {
    sendBtn.disabled = false; input.focus();
  }
}

sendBtn.addEventListener("click", () => send());
input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
$("examples").addEventListener("click", (e) => { const b = e.target.closest("button"); if (b) send(b.textContent); });

$("download").addEventListener("click", () => {
  if (!pdfBase64) return;
  const a = document.createElement("a");
  a.href = "data:application/pdf;base64," + pdfBase64;
  a.download = ((doc?.meta?.docLabel) || "guide").replace(/[^\w-]+/g, "-").toLowerCase() + ".pdf";
  a.click();
});

$("toCanva").addEventListener("click", async () => {
  if (!pdfBase64) return;
  const btn = $("toCanva"); const label = btn.textContent;
  btn.disabled = true; btn.textContent = "Envoi…";
  try {
    const r = await fetch("/api/guide/canva", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pdfBase64, title: (doc?.meta?.coverTitle || "Guide") + " — Vape Société" }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
    addMsg("sys", "✓ Exporté vers Canva" + (data.editUrl ? " — ouvre : " + data.editUrl : "") );
    if (data.editUrl) window.open(data.editUrl, "_blank");
  } catch (e) {
    addMsg("sys", "⚠ Export Canva : " + e.message);
  } finally { btn.disabled = false; btn.textContent = label; }
});
</script>
</body>
</html>
